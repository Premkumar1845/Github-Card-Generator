<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Dev Card Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- html2canvas: render the DOM card to a canvas (JPG) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
    <!-- jsPDF: build a PDF from the canvas image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent: #238636;
            --accent-hover: #2ea043;
            --error: #f85149;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            line-height: 1.5;
            -webkit-text-size-adjust: 100%;
        }

        img,
        svg {
            max-width: 100%;
            height: auto;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #f0f6fc, #58a6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            background: var(--card-bg);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: border-color 0.2s;
        }

        .input-group:focus-within {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        input {
            flex: 1;
            min-width: 0;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            /* >=16px prevents iOS auto-zoom */
            padding: 12px 16px;
            outline: none;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 140px;
        }

        button:hover:not(:disabled) {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(35, 134, 54, 0.3);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Result Area */
        #result-container {
            margin-top: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-wrapper {
            animation: fadeIn 0.6s ease-out forwards;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loading Skeleton */
        .skeleton {
            width: 100%;
            max-width: 400px;
            height: 300px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: none;
        }

        .skeleton-content {
            background: linear-gradient(90deg, #161b22 25%, #21262d 50%, #161b22 75%);
            background-size: 200% 100%;
            animation: pulse 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes pulse {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .skeleton-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 20px;
        }

        .skeleton-line {
            height: 12px;
            margin-bottom: 12px;
        }

        .skeleton-line.short {
            width: 40%;
        }

        .skeleton-line.medium {
            width: 70%;
        }

        .skeleton-line.long {
            width: 90%;
        }

        /* Actions */
        .actions {
            margin-top: 24px;
            display: none;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-secondary {
            background-color: #21262d;
            border: 1px solid var(--border-color);
            color: #c9d1d9;
        }

        .btn-secondary:hover {
            background-color: #30363d;
            border-color: #8b949e;
            box-shadow: none;
        }

        /* Download format picker */
        .download-group {
            display: flex;
            gap: 0;
            background: #21262d;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .download-group select {
            background: transparent;
            color: #c9d1d9;
            border: none;
            border-right: 1px solid var(--border-color);
            padding: 0 12px;
            font-size: 0.9rem;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            min-width: 80px;
        }

        .download-group select option {
            background: #161b22;
            color: #c9d1d9;
        }

        .download-group button {
            background: transparent;
            border: none;
            color: #c9d1d9;
            min-width: 0;
            padding: 10px 18px;
            border-radius: 0;
        }

        .download-group:hover {
            border-color: #8b949e;
        }

        .download-group button:hover:not(:disabled) {
            background: #30363d;
            transform: none;
            box-shadow: none;
        }

        /* Social share row */
        .social-share {
            margin-top: 18px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .social-share .label {
            font-size: 0.82rem;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .social-icons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .social-btn {
            width: 42px;
            height: 42px;
            min-width: 0;
            padding: 0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            border: none;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
        }

        .social-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
        }

        .social-btn.whatsapp {
            background: #25D366;
        }

        .social-btn.twitter {
            background: #000000;
            border: 1px solid #30363d;
        }

        .social-btn.facebook {
            background: #1877F2;
        }

        .social-btn.linkedin {
            background: #0A66C2;
        }

        .social-btn.telegram {
            background: #26A5E4;
        }

        .social-btn.reddit {
            background: #FF4500;
        }

        .social-btn.instagram {
            background: radial-gradient(circle at 30% 110%,
                    #FFD675 0%, #FA7E1E 25%, #D62976 50%, #962FBF 75%, #4F5BD5 100%);
        }

        .social-btn.email {
            background: #6e7681;
        }

        #error-msg {
            color: var(--error);
            margin-top: 20px;
            display: none;
            font-size: 0.9rem;
        }

        .success-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #238636;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            max-width: calc(100% - 32px);
            text-align: center;
        }

        /* Tablets and below */
        @media (max-width: 640px) {
            body {
                padding: 24px 14px;
            }

            h1 {
                font-size: 1.85rem;
            }

            p.subtitle {
                font-size: 1rem;
                margin-bottom: 28px;
            }

            .input-group {
                flex-direction: column;
                gap: 8px;
                padding: 10px;
            }

            .input-group input {
                width: 100%;
                padding: 12px 14px;
            }

            button {
                width: 100%;
                min-width: 0;
                padding: 14px 20px;
            }

            .skeleton {
                height: auto;
                min-height: 260px;
            }

            .actions {
                width: 100%;
            }

            .actions .btn-secondary {
                width: 100%;
            }
        }

        /* Very small phones */
        @media (max-width: 380px) {
            h1 {
                font-size: 1.55rem;
            }

            p.subtitle {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>GitHub Dev Card Generator</h1>
        <p class="subtitle">Enter any public GitHub username to generate your developer profile card.</p>

        <div class="input-group">
            <input type="text" id="username" placeholder="e.g. torvalds"
                onkeypress="if(event.key === 'Enter') generateCard()">
            <button id="generate-btn" onclick="generateCard()">Generate Card</button>

        <div id="error-msg"></div>

        <div id="result-container">
            <!-- Loading Skeleton -->

                <div class="skeleton-content skeleton-line short"></div>
                <div style="margin-top: 30px;"></div>
                <div class="skeleton-content skeleton-line long"></div>
                <div class="skeleton-content skeleton-line long"></div>
                <div class="skeleton-content skeleton-line medium"></div>
            </div>

            <!-- Card Result -->

            <div class="actions" id="action-buttons">

                        </path>

                <div class="download-group" title="Pick a format and download">
                    <select id="download-format" aria-label="Download format">

                    <button type="button" onclick="downloadCard()">

                            </path>
                            <path d="M2.75 14a.75.75 0 0 0 0 1.5h10.5a.75.75 0 0 0 0-1.5H2.75Z"></path>
                        </svg>
                        Download
                    </button>
                </div>
            </div>

            <div class="social-share" id="social-share">
                <span class="label">Share on</span>
                <div class="social-icons">
                    <button class="social-btn whatsapp" title="Share on WhatsApp" onclick="shareOn('whatsapp')"

                    </button>

                        aria-label="Share on Reddit">

    </div>

    <div id="toast" class="success-toast">Link copied to clipboard!</div>

    <script>
        let currentCardUrl = "";
        let currentUsername = "";
        let retryTimer = null;
        const API_BASE = "${BACKEND_URL}";

        async function generateCard() {
            const usernameInput = document.getElementById('username');
            const username = usernameInput.value.trim();
            const generateBtn = document.getElementById('generate-btn');
            const skeleton = document.getElementById('loading-skeleton');
            const cardResult = document.getElementById('card-result');
            const errorMsg = document.getElementById('error-msg');
            const actions = document.getElementById('action-buttons');
            const social = document.getElementById('social-share');

            if (!username) return;

            // Clear any pending retry
            if (retryTimer) {
                clearInterval(retryTimer);
                retryTimer = null;
            }

            // Reset UI
            errorMsg.style.display = 'none';
            cardResult.innerHTML = '';
            actions.style.display = 'none';
            social.style.display = 'none';

            // Start Loading
            generateBtn.disabled = true;
            generateBtn.innerText = 'Generating...';
            skeleton.style.display = 'block';

            try {
                const response = await fetch(`${API_BASE}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });

                if (!response.ok) {
                    const err = await response.json();
                    const errorDetail = err.detail || 'Failed to generate card';

                    // Specific handling for rate limit errors
                    if (response.status === 429 || errorDetail.includes('429') || errorDetail.includes('rate limit')) {
                        throw { isRateLimit: true, message: errorDetail };
                    }
                    throw new Error(errorDetail);
                }

                const data = await response.json();

                // Success
                cardResult.innerHTML = data.html;
                currentUsername = data.username || username;
                // Prefer the unique share_url (fresh per generation); fall back to card_url
                const sharePath = data.share_url || data.card_url;
                currentCardUrl = `${API_BASE}${sharePath}`;
                actions.style.display = 'flex';
                social.style.display = 'flex';

            } catch (error) {
                if (error.isRateLimit) {
                    // Show friendly rate limit message with auto-retry countdown
                    let countdown = 30;
                    errorMsg.innerHTML = `⏳ <strong>Rate limit reached.</strong> The Gemini API is temporarily busy. Auto-retrying in <span id="countdown">${countdown}</span>s... <button onclick="generateCard()" style="background:#238636;color:white;border:none;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:0.85rem;margin-left:8px;">Retry Now</button>`;
                    errorMsg.style.display = 'block';
                    errorMsg.style.color = '#d29922'; // warning amber instead of error red

                    retryTimer = setInterval(() => {
                        countdown--;
                        const el = document.getElementById('countdown');
                        if (el) el.textContent = countdown;
                        if (countdown <= 0) {
                            clearInterval(retryTimer);
                            retryTimer = null;
                            generateCard();
                        }
                    }, 1000);
                } else {
                    errorMsg.innerText = `Error: ${error.message}`;
                    errorMsg.style.color = 'var(--error)';
                    errorMsg.style.display = 'block';
                }
            } finally {
                // End Loading
                generateBtn.disabled = false;
                generateBtn.innerText = 'Generate Card';
                skeleton.style.display = 'none';
            }
        }

        async function copyToClipboard(silent = false) {
            if (!currentCardUrl) return false;
            try {
                await navigator.clipboard.writeText(currentCardUrl);
                if (!silent) showToast('Share link copied to clipboard!');
                return true;
            } catch (err) {
                console.error('Failed to copy: ', err);
                // Fallback for non-secure contexts
                try {
                    const ta = document.createElement('textarea');
                    ta.value = currentCardUrl;
                    ta.style.position = 'fixed';
                    ta.style.opacity = '0';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    if (!silent) showToast('Share link copied to clipboard!');
                    return true;
                } catch (_) {
                    return false;
                }
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            if (message) toast.textContent = message;
            toast.style.display = 'block';
            clearTimeout(showToast._t);
            showToast._t = setTimeout(() => {
                toast.style.display = 'none';
            }, 2800);
        }

        function getCardElement() {
            return document.querySelector('#card-result .card');
        }

        async function downloadCard() {
            const cardEl = getCardElement();
            if (!cardEl) {
                showToast('No card to download yet.');
                return;
            }
            const format = document.getElementById('download-format').value;
            const filenameBase = `github-card-${currentUsername || 'profile'}`;

            try {
                showToast(`Preparing ${format.toUpperCase()}...`);
                // Wait a tick so the toast renders before the (heavier) canvas work
                await new Promise(r => setTimeout(r, 30));

                const canvas = await html2canvas(cardEl, {
                    backgroundColor: null,
                    scale: 2,           // hi-DPI for sharp output
                    useCORS: true,      // allow GitHub avatar
                    logging: false,
                });

                if (format === 'jpg') {
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
                    triggerDownload(dataUrl, `${filenameBase}.jpg`);
                    showToast('JPG downloaded!');
                } else if (format === 'pdf') {
                    const { jsPDF } = window.jspdf;
                    const imgData = canvas.toDataURL('image/jpeg', 0.95);
                    // Fit the card image onto an A4 portrait page, centered
                    const pdf = new jsPDF({ orientation: 'p', unit: 'pt', format: 'a4' });
                    const pageW = pdf.internal.pageSize.getWidth();
                    const pageH = pdf.internal.pageSize.getHeight();
                    const margin = 40;
                    const maxW = pageW - margin * 2;
                    const maxH = pageH - margin * 2;
                    const ratio = Math.min(maxW / canvas.width, maxH / canvas.height);
                    const w = canvas.width * ratio;
                    const h = canvas.height * ratio;
                    const x = (pageW - w) / 2;
                    const y = (pageH - h) / 2;
                    pdf.addImage(imgData, 'JPEG', x, y, w, h);
                    pdf.save(`${filenameBase}.pdf`);
                    showToast('PDF downloaded!');
                }
            } catch (err) {
                console.error('Download failed:', err);
                showToast('Download failed. See console.');
            }
        }

        function triggerDownload(dataUrl, filename) {
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function shareOn(platform) {
            if (!currentCardUrl) return;
            const url = encodeURIComponent(currentCardUrl);
            const text = encodeURIComponent(
                `Check out ${currentUsername ? '@' + currentUsername : 'my'} AI-generated GitHub Dev Card:`
            );
            const subject = encodeURIComponent('My GitHub Dev Card');

            let shareUrl = '';
            switch (platform) {
                case 'whatsapp':
                    shareUrl = `https://wa.me/?text=${text}%20${url}`;
                    break;
                case 'twitter':
                    shareUrl = `https://twitter.com/intent/tweet?text=${text}&url=${url}`;
                    break;
                case 'facebook':
                    shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
                    break;
                case 'linkedin':
                    shareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`;
                    break;
                case 'telegram':
                    shareUrl = `https://t.me/share/url?url=${url}&text=${text}`;
                    break;
                case 'reddit':
                    shareUrl = `https://www.reddit.com/submit?url=${url}&title=${subject}`;
                    break;
                case 'email':
                    shareUrl = `mailto:?subject=${subject}&body=${text}%20${url}`;
                    break;
                case 'instagram':
                    // Instagram has no web share intent; copy the link so the user can paste it.
                    copyToClipboard(true).then(ok => {
                        showToast(ok
                            ? 'Link copied! Paste it into Instagram.'
                            : 'Could not copy link.');
                    });
                    return;
            }

            if (shareUrl) {
                if (platform === 'email') {
                    window.location.href = shareUrl;
                } else {
                    window.open(shareUrl, '_blank', 'noopener,noreferrer,width=600,height=600');
                }
            }
        }
    </script>
